<app-sidebar />

<!-- Background Effects -->
<div class="bg-gradient-overlay" [class.show-bg]="state.isAnimatingOut()"></div>

<!-- Ambient Glow Orbs -->
<div class="ambient-orb orb-1" [class.show-bg]="state.isAnimatingOut()"></div>
<div class="ambient-orb orb-2" [class.show-bg]="state.isAnimatingOut()"></div>
<div class="ambient-orb orb-3" [class.show-bg]="state.isAnimatingOut()"></div>

<!-- Blurred Logo Background -->
<div class="bg-logo-blur" [class.fade-out]="state.isAnimatingOut()"></div>

<!-- Main Layout Shell -->
<section class="main-layout">
  <div class="content-wrapper" [class.animating-out]="state.isAnimatingOut()">
    <app-prompt-field style="order: 2; width: 100%; display: flex; justify-content: center; z-index: 10;" />
    
    <!-- Routed Pages (Home / Results) -->
    <div style="display: contents;">
      <router-outlet />
    </div>
  </div>
</section>
