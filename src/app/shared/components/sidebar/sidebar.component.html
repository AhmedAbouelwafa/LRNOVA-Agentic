<aside class="agentic-sidebar" id="main-sidebar">
  <div class="sidebar-top">
    <!-- Home -->
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="sidebar-item" (click)="state.goHome()">
      <div class="sidebar-icon home-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </div>
      <span class="sidebar-text">Home</span>
    </a>

    <!-- Avatar -->
    <a href="#" class="sidebar-item">
      <div class="sidebar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </div>
      <span class="sidebar-text">Avatar</span>
    </a>

    <!-- Brand -->
    <a href="#" class="sidebar-item">
      <div class="sidebar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" />
        </svg>
      </div>
      <span class="sidebar-text">Brand</span>
    </a>

    <!-- Apps -->
    <a href="#" class="sidebar-item">
      <div class="sidebar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.17 3.22c.98.98.98 2.56 0 3.54l-11.3 11.3-4.95 1.41 1.41-4.95 11.3-11.3c.98-.98 2.56-.98 3.54 0z" />
          <path d="M15 5l4 4" />
        </svg>
      </div>
      <span class="sidebar-text">Apps</span>
    </a>

    <div class="sidebar-divider"></div>

    <!-- Projects -->
    <a href="#" class="sidebar-item">
      <div class="sidebar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
        </svg>
      </div>
      <span class="sidebar-text">Projects</span>
    </a>
  </div>

  <div class="sidebar-bottom">
    <!-- Notifications -->
    <button class="sidebar-item">
      <div class="sidebar-icon notification-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
        <span class="badge">2</span>
      </div>
    </button>

    <!-- Diamond -->
    <button class="sidebar-item">
      <div class="sidebar-icon circle-icon diamond">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 22 22 7 12 2"></polygon>
          <polyline points="2 7 12 12 22 7"></polyline>
          <polyline points="12 22 12 12"></polyline>
        </svg>
      </div>
    </button>

    <!-- Code -->
    <button class="sidebar-item">
      <div class="sidebar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6" />
          <polyline points="8 6 2 12 8 18" />
        </svg>
      </div>
    </button>

    <!-- User L -->
    <button class="sidebar-item">
      <div class="sidebar-icon circle-icon user-l">
        <span>L</span>
      </div>
    </button>
  </div>
</aside>
