<div class="prompt-wrapper" id="prompt-wrapper" [class.compact-mode]="state.isAnimatingOut()">
  <div class="prompt-container" [class.focused]="state.isPromptFocused()" id="prompt-container">
    <div class="prompt-inner">
      <div class="prompt-input-row">
        <input type="text" class="prompt-input"
          [placeholder]="typedPlaceholder.output()"
          [ngModel]="state.promptText()"
          (ngModelChange)="state.promptText.set($event)"
          (focus)="state.isPromptFocused.set(true)"
          (blur)="state.isPromptFocused.set(false)"
          (keydown.enter)="onSubmit()"
          [readonly]="state.isGenerating() || state.isAnimatingOut()"
          id="prompt-input" />
      </div>
      <div class="prompt-actions-row">
        <button class="attach-btn" [title]="i18n.t('prompt.addFile')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
        <div class="prompt-actions-right">
          <div class="plan-toggle" (click)="onTogglePlan($event)">
            <div class="toggle-slider" [class.is-pro]="state.selectedPlan() === 'pro'"></div>
            <span class="toggle-label" [class.active]="state.selectedPlan() === 'flash'">{{ i18n.t('prompt.flash') }}</span>
            <span class="toggle-label" [class.active]="state.selectedPlan() === 'pro'">{{ i18n.t('prompt.pro') }}</span>
          </div>
          <button class="prompt-submit"
            [class.has-text]="state.promptText().trim().length > 0"
            (click)="onSubmit()"
            id="btn-submit-prompt">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
