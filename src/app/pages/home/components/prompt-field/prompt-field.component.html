<div class="prompt-wrapper" id="prompt-wrapper" [class.compact-mode]="state.isAnimatingOut()">
  <div class="prompt-container" [class.focused]="state.isPromptFocused()" id="prompt-container">
    <div class="prompt-inner">
      <!-- Attached Files Preview -->
      @if (state.attachedFiles().length > 0) {
        <div class="attached-files-container">
          @for (file of state.attachedFiles(); track file.name; let i = $index) {
            <div class="attached-file-pill">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" />
                <polyline points="13 2 13 9 20 9" />
              </svg>
              <span class="file-name" [title]="file.name">{{ file.name }}</span>
              <button class="remove-file-btn" (click)="removeFile(i)" title="Remove">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
              </button>
            </div>
          }
        </div>
      }

      <div class="prompt-input-row">
        <input type="text" class="prompt-input"
          [placeholder]="typedPlaceholder.output()"
          [ngModel]="state.promptText()"
          (ngModelChange)="state.promptText.set($event)"
          (focus)="state.isPromptFocused.set(true)"
          (blur)="state.isPromptFocused.set(false)"
          (keydown.enter)="onSubmit()"
          [readonly]="state.isGenerating() || state.isAnimatingOut()"
          id="prompt-input" />
      </div>
      <div class="prompt-actions-row">
        <!-- Hidden file input -->
        <input type="file" #fileInput (change)="onFileSelected($event)" multiple style="display: none;" />
        
        <button class="attach-btn" [title]="i18n.t('prompt.addFile')" (click)="triggerFileInput()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
        <div class="prompt-actions-right">
          <div class="plan-toggle" (click)="onTogglePlan($event)">
            <div class="toggle-slider" [class.is-pro]="state.selectedPlan() === 'pro'"></div>
            <span class="toggle-label" [class.active]="state.selectedPlan() === 'flash'">{{ i18n.t('prompt.flash') }}</span>
            <span class="toggle-label" [class.active]="state.selectedPlan() === 'pro'">{{ i18n.t('prompt.pro') }}</span>
          </div>
          <button class="prompt-submit"
            [class.has-text]="state.promptText().trim().length > 0 || state.attachedFiles().length > 0"
            (click)="onSubmit()"
            id="btn-submit-prompt">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
