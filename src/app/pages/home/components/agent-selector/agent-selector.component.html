<div class="scenarios-wrapper">
  <div class="agent-icons">
    <!-- Quick Start Scenario -->
    <button class="agent-btn scenario-btn" (click)="toggleDropdown($event)" id="btn-quick-start" title="Quick Start Options" [class.active]="isDropdownOpen()" style="position: relative; overflow: visible;">
      @if (state.tourStep() === 5) {
        <div class="tour-card arrow-bottom" style="bottom: calc(100% + 20px); left: 50%; transform: translateX(-50%); cursor: default; position: absolute; z-index: 100;" (click)="$event.stopPropagation()">
          <div class="tour-content">
            <h3>{{ i18n.currentLang() === 'ar' ? 'البدء السريع' : 'Quick Start' }}</h3>
            <p>{{ i18n.currentLang() === 'ar' ? 'اختر أداة من أدوات البدء السريع لإنشاء المحتوى مباشرة.' : 'Choose a quick start tool to generate content instantly.' }}</p>
          </div>
          <div class="tour-actions">
            <button class="skip-btn" (click)="state.tourStep.set(0)">{{ i18n.currentLang() === 'ar' ? 'تخطي الجولة' : 'Skip Tour' }}</button>
            <button class="next-btn" (click)="state.tourStep.set(6)">{{ i18n.currentLang() === 'ar' ? 'التالي' : 'Next' }}</button>
          </div>
        </div>
      }
      <div class="agent-icon-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
        </svg>
      </div>
      <span class="agent-label">Quick Start</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left: 4px; transition: transform 0.3s;" [style.transform]="isDropdownOpen() ? 'rotate(180deg)' : 'rotate(0)'">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </button>

    <!-- Projects Scenario -->
    <button class="agent-btn scenario-btn" (click)="goToProjects()" id="btn-projects" title="Manage your previous projects" style="position: relative; overflow: visible;">
      @if (state.tourStep() === 6) {
        <div class="tour-card arrow-bottom" style="bottom: calc(100% + 20px); left: 50%; transform: translateX(-50%); cursor: default; position: absolute; z-index: 100;" (click)="$event.stopPropagation()">
          <div class="tour-content">
            <h3>{{ i18n.currentLang() === 'ar' ? 'المشاريع' : 'Projects' }}</h3>
            <p>{{ i18n.currentLang() === 'ar' ? 'يمكنك الوصول إلى مشاريعك السابقة وإدارتها من هنا.' : 'Generate multiple result from multiple tool.' }}</p>
          </div>
          <div class="tour-actions">
            <button class="skip-btn" (click)="state.tourStep.set(0)">{{ i18n.currentLang() === 'ar' ? 'تخطي الجولة' : 'Skip Tour' }}</button>
            <button class="next-btn" (click)="state.tourStep.set(8)">{{ i18n.currentLang() === 'ar' ? 'التالي' : 'Next' }}</button>
          </div>
        </div>
      }
      <div class="agent-icon-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
        </svg>
      </div>
      <span class="agent-label">Project</span>
    </button>
  </div>

  @if (isDropdownOpen()) {
    <div class="dropdown-menu expanded-panel" (click)="$event.stopPropagation()">
      <div class="tools-grid">
        @for (tool of tools; track tool.id) {
          <button class="tool-chip" (click)="selectTool(tool.id)" [title]="tool.desc">
            <span class="tool-chip-icon">
              @switch (tool.id) {
                @case ('Video') { <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg> }
                @case ('Text Video') { <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg> }
                @case ('Script') { <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> }
                @case ('Assessment') { <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> }
                @case ('Activity') { <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> }
                @case ('Topic') { <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> }
                @case ('Full Course Script') { <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg> }
                @case ('Full Course Content') { <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 12 12 17 22 12"></polyline><polyline points="2 17 12 22 22 17"></polyline></svg> }
              }
            </span>
            {{ tool.label }}
          </button>
        }
      </div>
    </div>
  }
</div>
