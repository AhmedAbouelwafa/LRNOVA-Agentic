<div class="agent-icons">
  <button class="agent-btn" [class.active]="state.activeAgent() === 'video'" (click)="selectAgent('video')" id="btn-video-agent" title="Video Agent">
    <div class="agent-icon-wrap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="23 7 16 12 23 17 23 7" />
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
      </svg>
    </div>
    <span class="agent-label">{{ i18n.t('agent.video') }}</span>
  </button>

  <button class="agent-btn" [class.active]="state.activeAgent() === 'text'" (click)="selectAgent('text')" id="btn-text-agent" title="Text Agent">
    <div class="agent-icon-wrap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2-2h12a2 2 0 0 0 2-2V8z" />
        <polyline points="14 2 14 8 20 8" />
        <line x1="16" y1="13" x2="8" y2="13" />
        <line x1="16" y1="17" x2="8" y2="17" />
        <polyline points="10 9 9 9 8 9" />
      </svg>
    </div>
    <span class="agent-label">{{ i18n.t('agent.text') }}</span>
  </button>
</div>
