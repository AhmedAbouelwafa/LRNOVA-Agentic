<div class="results-header">
  <div class="tools-toolbar-wrapper">
    <div class="tools-pills-container">
      @for (tool of state.activeTools(); track tool) {
        <button class="tool-pill" [class.active]="state.activeTool() === tool" (click)="state.activeTool.set(tool)">{{ tool }}</button>
      }
    </div>
    <div class="tools-actions-container">
      <button class="tool-action-pill">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="21" x2="4" y2="14" /><line x1="4" y1="10" x2="4" y2="3" />
          <line x1="12" y1="21" x2="12" y2="12" /><line x1="12" y1="8" x2="12" y2="3" />
          <line x1="20" y1="21" x2="20" y2="16" /><line x1="20" y1="12" x2="20" y2="3" />
          <line x1="1" y1="14" x2="7" y2="14" /><line x1="9" y1="8" x2="15" y2="8" />
          <line x1="17" y1="16" x2="23" y2="16" />
        </svg>
        Filter
      </button>
      <button class="tool-action-pill">
        Sources
        <span class="tool-badge">12</span>
      </button>
    </div>
  </div>
</div>
