<!-- Browser Tabs Bar -->
<div class="canvas-tabs-bar">
  <div class="tab-group">
    @for (tab of state.canvasTabs(); track tab.id) {
      <div class="tab" [class.active]="state.activeTabId() === tab.id" (click)="state.setActiveTab(tab.id)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
        <span class="tab-label">{{ tab.label }}</span>
        @if (state.canvasTabs().length > 1) {
          <button class="tab-close" (click)="state.removeCanvasTab(tab.id); $event.stopPropagation()">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        }
      </div>
    }
  </div>
  <div class="window-controls">
    <span class="window-dot dot-close"></span>
    <span class="window-dot dot-min"></span>
    <span class="window-dot dot-max"></span>
  </div>
</div>
