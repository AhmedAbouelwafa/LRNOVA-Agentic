<div class="canvas-workspace fade-in-up" [attr.dir]="i18n.dir()">
  <div class="workspace-main">
    <div class="slides-result-canvas" [class.revealed]="isRevealed()">

      <!-- Slides Header -->
      <div class="slides-header">
        <div class="slides-badges">
          <span class="slides-badge ai-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
            AI Generated
          </span>
          <span class="slides-badge type-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            Presentation Slides
          </span>
        </div>
        <h2 class="slides-title">{{ state.submittedPrompt() || 'Generated Presentation' }}</h2>
      </div>

      <!-- Slides Embed -->
      <div class="slides-embed-wrapper">
        <iframe 
          [src]="slidesEmbedUrl"
          class="slides-iframe"
          frameborder="0"
          allowfullscreen
          loading="lazy">
        </iframe>
      </div>

      <!-- Slides Footer -->
      <div class="slides-footer">
        <div class="slides-meta">
          <span class="meta-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            12 slides
          </span>
          <span class="meta-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            ~8 min read
          </span>
        </div>
        <div class="slides-actions">
          <button class="action-btn outline">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download PPTX
          </button>
          <button class="action-btn outline">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
              <polyline points="16 6 12 2 8 6"/>
              <line x1="12" y1="2" x2="12" y2="15"/>
            </svg>
            Export SCORM
          </button>
          <button class="action-btn primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            Present
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
