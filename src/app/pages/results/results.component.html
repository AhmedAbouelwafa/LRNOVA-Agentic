<div class="results-container fade-in-up" [class.full-width]="state.isGenerationComplete() && state.activeAgent() === 'video'" style="order: 3; width: 100%">
  <app-results-toolbar />
  
  @if (!state.isGenerationComplete()) {
    <app-thinking-indicator />
    <app-skeleton-card />
  } @else {
    @if (state.activeAgent() === 'video') {
      <app-video-result />
    } @else {
      <!-- Placeholder for text result -->
      <app-skeleton-card />
    }
  }

  <app-sticky-prompt />
</div>
