@if (!selectedTool()) {
  <!-- Apps Grid View -->
  <div class="apps-page" id="apps-page">
    <div class="apps-header">
      <h1 class="apps-title">{{ i18n.t('apps.title') }}</h1>
      <p class="apps-subtitle">{{ i18n.t('apps.subtitle') }}</p>
    </div>

    <div class="apps-grid">
      @for (tool of tools; track tool.id; let i = $index) {
        <button class="app-card" 
          [style.--card-gradient]="tool.gradient"
          [style.--card-accent]="tool.accentColor"
          [style.animation-delay]="(i * 0.06) + 's'"
          (click)="selectTool(tool)"
          [id]="'app-card-' + tool.id">

          <div class="card-image-wrap">
            <img [src]="tool.image" [alt]="tool.label" class="card-image" loading="lazy" />
            <div class="card-image-overlay"></div>
            <div class="card-icon-badge">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path [attr.d]="tool.icon" />
              </svg>
            </div>
          </div>

          <div class="card-body">
            <span class="card-label">{{ tool.label }}</span>
            <p class="card-desc">{{ tool.desc }}</p>
          </div>

          <div class="card-arrow">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12" />
              <polyline points="12 5 19 12 12 19" />
            </svg>
          </div>
        </button>
      }
    </div>
  </div>
} @else {
  <!-- Tool Detail View (Home-like) -->
  <div class="tool-detail-view" style="display: contents;">
    <!-- Top Content (Order 1) -->
    <div class="tool-detail-top" style="order: 1;">
      <div style="text-align: start; margin-bottom: 1rem;">
        <button class="back-btn" (click)="goBack()" id="apps-back-btn" style="margin-bottom: 0;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
          <span>{{ i18n.t('apps.backToApps') }}</span>
        </button>
      </div>

      <div class="tool-hero" style="margin-bottom: 1.5rem;">
        <div class="tool-icon-large" [style.background]="selectedTool()!.gradient">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path [attr.d]="selectedTool()!.icon" />
          </svg>
        </div>
        <h1 class="tool-hero-title">
          <span class="tool-hero-line">{{ i18n.t('apps.createWith') }}</span>
          <span class="tool-hero-typed gradient-text">
            {{ typedToolName.output() }}<span class="typewriter-cursor">|</span>
          </span>
        </h1>
        <p class="tool-hero-desc">{{ selectedTool()!.desc }}</p>
      </div>
    </div>

    <!-- Bottom Content (Order 3) -->
    <div class="tool-detail-bottom" style="order: 3;">
      <app-suggestions />
    </div>
  </div>
}
